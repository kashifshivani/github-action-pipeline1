# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions: 
  id-token: write
  contents: read
  
jobs: 
  terraform-init-plan:
    runs-on: self-hosted
    steps: 
      - name: Checkout
        uses: actions/checkout@v5.0.0
    
      - name: Azure Login
        uses: Azure/login@v2.3.0
        with:
          client-id: e99be238-5107-4c5f-801c-07b9880f0b92
          tenant-id: 69618a60-7b0d-4ead-bde5-911b183f9003
          subscription-id: 0b8a345f-5bb0-4af0-89af-77476d7c9b6f

      - name: terraform init
        id: init
        run: 
          pwd
          ls
        working-directory: environments/dev
        
      
